{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <div class="mb-4">
                    <h3 class="fw-bold">แบบฟอร์มบันทึกข้อมูลประชากร</h3>
                </div>
                
                <form method="post" action="/form/">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="name" class="form-label">ชื่อประชากร</label>
                        <input type="text" class="form-control" name="name" id="name" placeholder="กรุณากรอกชื่อ-นามสกุล">
                    </div>
                    <div class="mb-3">
                        <label for="age" class="form-label">อายุ</label>
                        <input type="number" class="form-control" name="age" id="age" placeholder="กรอกข้อมูลอายุเป็นตัวเลข">
                    </div>
                    
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn text-white" style="background-color: rgb(255, 0, 170);">ลงทะเบียน</button>
                        <button type="reset" class="btn text-white" style="background-color: orange;">ล้างข้อมูล</button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
