{% extends "base.html" %}
{% block title %}แบบฟอร์มแก้ไขข้อมูลประชากร{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h2 class="text-center mb-0">แบบฟอร์มแก้ไขข้อมูล</h2>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="name" class="form-label">ชื่อประชากร</label>
                            <input type="text" class="form-control" name="name" value="{{ person.name }}">
                        </div>
                        <div class="mb-3">
                            <label for="age" class="form-label">อายุ</label>
                            <input type="number" class="form-control" name="age" value="{{ person.age }}">
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">อัปเดตข้อมูล</button>
                            <a href="/" class="btn btn-secondary">ยกเลิก</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
